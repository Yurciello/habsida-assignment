<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>

    <div class="left">
        <img src="img/logo.svg" alt="logo" width="100px" class="logo">
    </div>




    <div class="right">
        <p class="h3">Get iintoo it today</p>
        <p class="h4">There is no charge or obligation upon registration</p>
        <div class="buttons">
            <a href="https://www.facebook.com" id="reg-facebook" target="_blank">Register with Facebook</a>
            <a href="https://www.linkedin.com" id="reg-linkedin" target="_blank">Register with Facebook</a>


            <!-- <id="reg-facebook" type="button">Register with Facebook</button>
            <button id="reg-linkedin" type="button">Register with LinkedIn</button> -->
        </div>
        <p class="or">
            OR
        </p>

        <form class="name-phone">
            <p>
                <label for="email">Email</label>
                <input type="email" name="Email" id="email" placeholder="honggildong@email.com" required>
            </p>
            <p>
                <label for="phone">Phone</label>
                <input type="tel" name="Phone" id="phone">
            </p>
        </form>


        <p class="q1"><b>What type of investor are you?</b></p>
        <p class="q2">Select the type of investor you are below</p>

        <form>
            <div class="qradio">
                <label><input type="radio" name="option" value="individual" class="individual">Individual
                <div>I am a natural person investing on my own behalf as a sole owner, joint tenant, or tenant in common.</div>
                </label>
               
                
                <label><input type="radio" name="option" value="business">Business 
                <div>I am WHO KNOWS a natural person investing on my own behalf as a sole owner, joint tenant, or tenant in common.</div></label>
               
                
                <label><input type="radio" name="option" value="ira">IRA 
                <div>I am MAYBE a natural person investing on my own behalf as a sole owner, joint tenant, or tenant in common.</div></label>
                
                
                <label><input type="radio" name="option" value="trust">Trust 
                <div class="last">I am NOT a natural person investing on my own behalf as a sole owner, joint tenant, or tenant in common.</div></label>
                <!-- <div class="extra4">I am a natural person investing on my own behalf as a sole owner, joint tenant, or tenant in common.</div> -->
                 <!-- ⓘ -->
                  <!-- <img src="img/Infobox_info_icon.svg" alt="info icon" height="13px"> -->
                

            </div>

            <label class="agreement"><input type="checkbox" name="agreement" id="agreement" required>I agree to the terms and services from iintoo
                <a href="" target="_blank">View full terms</a></label>

            <input type="submit" id="login" value="Create Account">




        </form>
        </main>





    </div>

</body>

</html>
